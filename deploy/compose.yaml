services:
  postgres:
    image: pgvector/pgvector:pg16-trixie
    container_name: qa-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: qa_regression_assistant
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_password

    ports:
      - "5432:5432"

    volumes:
      - qa_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_user -d qa_regression_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qa_postgres_data: